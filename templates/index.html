<!DOCTYPE html>
<html>

<head>

<title>Emora AI</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="{{ url_for('static', filename='css/adminlte.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>

</head>


<body>

<div class="container-fluid vh-100">

<div class="row h-100">

<!-- SIDEBAR -->
<div id="sidebar" class="col-md-3 bg-dark text-white p-3 d-flex flex-column">

<h4 class="mb-3 d-flex align-items-center justify-content-between">

<img src="{{ url_for('static', filename='images/emora-logo.png') }}" 
class="emora-logo">

</h4>

<button onclick="newChat()" class="btn btn-primary mb-3">
<i data-lucide="plus"></i> New Chat
</button>

<h6>Chat History</h6>

<div class="history flex-grow-1 overflow-auto"></div>

<button onclick="clearHistory()" class="btn btn-danger mt-3">
<i data-lucide="trash"></i> Clear History
</button>

</div>


<!-- CHAT AREA -->
<div id="chatArea" class="col-md-6 d-flex flex-column p-0">

<div class="card flex-grow-1 d-flex flex-column">

<div class="card-header d-flex align-items-center">

<button class="btn btn-light me-2" onclick="toggleSidebar()">
<i data-lucide="menu"></i>
</button>

<h5 class="assistant-title mb-0">
<i data-lucide="message-circle"></i>
<span>Emotional Assistant</span>
</h5>

</div>


<div class="card-body d-flex flex-column p-0">

<div id="chatbox" class="chatbox flex-grow-1"></div>

</div>

<div class="card-footer">

<div class="d-flex">

<input
id="message"
class="form-control"
placeholder="Type your message..."
onkeypress="handleKey(event)"
autocomplete="off"
>

<button id="micButton" class="btn btn-secondary ms-2" onclick="startListening()">
<i data-lucide="mic"></i>
</button>

<input type="file" id="audioFile" class="form-control ms-2" accept="audio/*">

<button class="btn btn-info ms-2" onclick="uploadAudio()">
Upload
</button>

<button class="btn btn-primary ms-2" onclick="sendMessage()">
<i data-lucide="send"></i>
</button>

</div>

</div>

</div>

</div>


<!-- ANALYTICS -->
<div id="analytics" class="col-md-3 p-3">

<div class="card mb-3">

<div class="card-header">
Emotion Distribution
</div>

<div class="card-body">

<div style="height:250px">
<canvas id="emotionChart"></canvas>
</div>

</div>

</div>


<div class="card">

<div class="card-header">
Emotion Timeline
</div>

<div class="card-body">

<div style="height:250px">
<canvas id="emotionTimeline"></canvas>
</div>

<div class="mt-3">
Total Messages: <span id="totalMessages">0</span>
</div>

</div>

</div>

</div>


</div>

</div>


<script src="{{ url_for('static', filename='chat.js') }}"></script>

<script>

function toggleSidebar(){

const sidebar = document.getElementById("sidebar")
const chat = document.getElementById("chatArea")

if(sidebar.classList.contains("d-none")){

sidebar.classList.remove("d-none")

chat.classList.remove("col-md-9")
chat.classList.add("col-md-6")

}else{

sidebar.classList.add("d-none")

chat.classList.remove("col-md-6")
chat.classList.add("col-md-9")

}

}

</script>
</body>
</html>
